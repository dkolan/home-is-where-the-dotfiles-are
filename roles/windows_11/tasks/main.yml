- name: Ensure Chocolatey is installed
  ansible.windows.win_stat:
    path: C:\ProgramData\chocolatey\bin\choco.exe
  register: choco_installed

- name: Install Chocolatey if missing
  ansible.windows.win_shell: |
    Set-ExecutionPolicy Bypass -Scope Process -Force;
    [System.Net.ServicePointManager]::SecurityProtocol = [System.Net.ServicePointManager]::SecurityProtocol -bor 3072;
    iex ((New-Object System.Net.WebClient).DownloadString('https://community.chocolatey.org/install.ps1'))
  args:
    executable: powershell.exe
  when: not choco_installed.stat.exists

- name: Install Chocolatey packages with real-time output
  loop:
    - firefox
    - kb2999226
    - 7zip
    - git
    - vlc
    - vscode
    - powershell-core
    - wireshark
    - ninja
    - wiztree
    - greenshot
    - gsudo
    - cmake
    - bat
    - less
    - llvm
    - pandoc
    - visualstudio2022professional
    - uv
    - epicgameslauncher
    - obsidian
    - powertoys
    - zoxide
    - fzf
    - oh-my-posh
    - poshgit
    - tree
  ansible.windows.win_command: choco install {{ item }} -y --verbose
  register: choco_results
  changed_when: "'installed' in choco_results.stdout or 'already installed' in choco_results.stdout"
  loop_control:
    label: "{{ item }}"

- name: Install PowerShell Modules
  loop:
    - PowerShellGet -Force -AllowClobber
    - Microsoft.PowerShell.PSResourceGet -Repository PSGallery
    - PSReadLine
  ansible.windows.win_shell: |
    Install-Module {{ item }}
  args:
    executable: pwsh.exe
  loop_control:
    label: "{{ item }}"
  register: ps_modules_results

- name: Ensure PowerShell profile directory exists
  ansible.builtin.win_file:
    path: "C:\\Users\\{{ ansible_env.USERNAME }}\\Documents\\PowerShell"
    state: directory

- name: Copy PowerShell profile to user directory
  ansible.builtin.win_copy:
    src: "dotfiles/Microsoft.PowerShell_profile.ps1"
    dest: "C:\\Users\\{{ ansible_env.USERNAME }}\\Documents\\PowerShell\\Microsoft.PowerShell_profile.ps1"
    force: yes